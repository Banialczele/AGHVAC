<!DOCTYPE html>
<html lang="pl">

<head>
	<meta charset="utf-8">
	<title>TetaGas Configurator</title>
	<link href="./css/index.css" rel="stylesheet" type="text/css" />
	<link href="./css/psustyles.css" rel="stylesheet" type="text/css" />
	<link href="./css/installationsegment.css" rel="stylesheet" type="text/css" />
</head>

<body id="body">
	<header id="header">
		<div id="headerContainer">
			<h2>
				Konfigurator Systemów Teta
			</h2>
			<img alt="Unable to find image" id="headerImage" src="./Icons/agLogo.png" />
			<div class="languageVersions">
				<a href="index.html?lang=en">English version</a>
				<a href="index.html?lang=pl">Wersja polska </a>
				<a href="index.html?licenses">Licenses </a>
			</div>
		</div>
		<p>PS011-002&PROJ R3 V1</p>

	</header>
	<div class="powerManagementInstallationContainer" id="powerManagementInstallationContainer">
		<div class="systemStatusContainer">
			<div class="systemInfo">
				<div class="sys">
					<p class="systemStatusDescription">System: </p>
					<img class="systemStatusText" id="systemStatusText" src="" alt="Unable to find image">
				</div>
				<p id="powerConsumption"></p>
				<p class="popup sticky"></p>
				<div class="systemWrongMessages">
					<p class="systemWrongDescription"></p>
					<ol class="systemWrongList">
					</ol>
					<div class="showMoreButtonContainer">
						<button type="button" class="showMoreButton">Pokaż więcej</button>
					</div>
				</div>
			</div>
			<div class="systemStatus">
				<div class="systemWrongInformation">
					<button class="helpButton">
						<img src="./Icons/help.svg" alt="Unable to find image" />
					</button>
				</div>
			</div>
		</div>

	</div>
	<div class="modalHelper" id="modalHelper">
		<div class="modalContent">
			<span class="modalClose">&times;</span>
			<div class="modalTitle">
				<h2>Okno pomocnicze</h2>
			</div>
			<p class="modalText">
			</p>
		</div>
	</div>
	<script src="./AnalysisEngine/models.js" type="text/javascript"></script>
	<script src="./js/cable.js" type="text/javascript"></script>
	<script src="./js/device.js" type="text/javascript"></script>
	<script src="./js/button.js" type="text/javascript"></script>
	<script src="./js/select.js" type="text/javascript"></script>
	<script src="./js/picture.js" type="text/javascript"></script>
	<script src="./js/input.js" type="text/javascript"></script>
	<script src="./js/checkbox.js" type="text/javascript"></script>
	<script src="js/index.js" type="text/javascript"></script>
	<script src="js/handlers.js" type="text/javascript"></script>
	<script src="./js/file.js" type="text/javascript"></script>
	<script src="./AnalysisEngine/analysisEngine.js"></script>
</body>

</html>
